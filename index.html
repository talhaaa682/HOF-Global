<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HOF — Compliance Command Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f7fa;--w:#fff;--s2:#f0f3f8;
  --b:#e2e8f0;--b2:#cbd5e1;
  --ac:#2563eb;--al:#eff6ff;
  --red:#dc2626;--rl:#fef2f2;
  --amb:#d97706;--al2:#fffbeb;
  --grn:#16a34a;--gl:#f0fdf4;
  --tx:#0f172a;--tx2:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Plus Jakarta Sans',sans-serif}
body{background:var(--bg);color:var(--tx);line-height:1.5;padding:24px}
.container{max-width:1400px;margin:0 auto}

/* Header & Controls */
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
.controls{display:flex;gap:12px;background:var(--w);padding:8px;border-radius:12px;border:1px solid var(--b)}
button{padding:8px 16px;border:none;background:none;border-radius:8px;cursor:pointer;font-weight:600;color:var(--tx2);transition:0.2s}
button.active{background:var(--ac);color:var(--w)}

/* Table Card */
.card{background:var(--w);border-radius:16px;border:1px solid var(--b);overflow:hidden;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
.card-header{padding:20px 24px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between;align-items:center}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:var(--s2);text-align:left;padding:12px 16px;color:var(--tx2);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:0.05em}
td{padding:16px;border-bottom:1px solid var(--b);vertical-align:middle}

/* Scoring UI */
.pc{display:flex;align-items:center;gap:12px}
.pct-bar{flex:1;height:8px;background:var(--b);border-radius:4px;overflow:hidden;min-width:60px}
.pct-fill{height:100%;border-radius:4px;transition:width 1s ease-in-out}
.tm{text-align:center;font-weight:500}

/* Status Pills */
.pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase}
.pg{background:var(--gl);color:var(--grn)}
.pa{background:var(--al2);color:var(--amb)}
.pr{background:var(--rl);color:var(--red)}

.loader{display:inline-block;width:20px;height:20px;border:3px solid var(--b);border-top-color:var(--ac);border-radius:50%;animation:spin 1s linear infinite;margin-right:10px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
#last-updated{font-size:12px;color:var(--tx2)}
</style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <h1 style="font-size:24px;font-weight:800;letter-spacing:-0.5px">HOF COMPLIANCE <span id="range-label" style="color:var(--ac)">DAILY</span></h1>
      <p id="last-updated">Initialising...</p>
    </div>
    <div class="controls">
      <button onclick="changeRange('daily')" id="btn-daily" class="active">Daily</button>
      <button onclick="changeRange('weekly')" id="btn-weekly">Weekly</button>
      <button onclick="changeRange('monthly')" id="btn-monthly">Monthly</button>
    </div>
  </header>

  <div class="card">
    <div class="card-header">
      <h2 style="font-size:16px">Consultant Performance</h2>
      <div id="loader-icon" style="display:none"><div class="loader"></div>Syncing...</div>
    </div>
    <div style="overflow-x:auto">
      <table id="cm-table">
        <thead>
          <tr>
            <th>Consultant</th>
            <th class="tm">Cases</th>
            <th class="tm">Score</th>
            <th>Compliance %</th>
            <th class="tm">Outcome</th>
            <th class="tm">Call</th>
            <th class="tm">Lead</th>
            <th class="tm">Deal</th>
            <th class="tm">Email</th>
            <th class="tm">WA</th>
            <th class="tm">Task</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="cm-body">
          </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyCG-dnhvuskro1VJnsIsoFKuCnmcZc7jYi6YuS8XOBkQ445ec7QA9-PQltq2kSIPUVeg/exec';

function changeRange(range) {
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + range).classList.add('active');
  document.getElementById('range-label').innerText = range.toUpperCase();
  loadData(range);
}

async function loadData(range) {
  const loader = document.getElementById('loader-icon');
  const tbody = document.getElementById('cm-body');
  loader.style.display = 'block';

  try {
    const resp = await fetch(`${API_URL}?range=${range}`);
    const data = await resp.json();
    
    // Sort by percentage descending
    data.sort((a, b) => b.pct - a.pct);

    tbody.innerHTML = data.map(d => {
      const color = d.pct >= 90 ? 'var(--grn)' : d.pct >= 75 ? 'var(--amb)' : 'var(--red)';
      const status = d.pct >= 90 ? 'EXCELLENT' : d.pct >= 75 ? 'GOOD' : 'CRITICAL';
      const pillClass = d.pct >= 90 ? 'pg' : d.pct >= 75 ? 'pa' : 'pr';

      return `
        <tr>
          <td><div style="font-weight:700;color:var(--tx)">${d.name}</div></td>
          <td class="tm">${d.cases}</td>
          <td class="tm"><span style="font-weight:700">${d.score.toFixed(0)}</span> / ${d.possible}</td>
          <td>
            <div class="pc">
              <span style="font-weight:700;min-width:45px">${d.pct.toFixed(1)}%</span>
              <div class="pct-bar">
                <div class="pct-fill" style="width:${Math.min(d.pct, 100)}%; background:${color}"></div>
              </div>
            </div>
          </td>
          <td class="tm">${d.categories[0].pct.toFixed(0)}%</td>
          <td class="tm">${d.categories[1].pct.toFixed(0)}%</td>
          <td class="tm">${d.categories[2].pct.toFixed(0)}%</td>
          <td class="tm">${d.categories[3].pct.toFixed(0)}%</td>
          <td class="tm">${d.categories[4].pct.toFixed(0)}%</td>
          <td class="tm">${d.categories[5].pct.toFixed(0)}%</td>
          <td class="tm">${d.categories[6].pct.toFixed(0)}%</td>
          <td><span class="pill ${pillClass}">${status}</span></td>
        </tr>
      `;
    }).join('');

    document.getElementById('last-updated').innerText = 'Last updated: ' + new Date().toLocaleTimeString();
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="12" style="text-align:center;padding:40px;color:var(--red)">Failed to load data. Please check Apps Script deployment.</td></tr>`;
    console.error(err);
  } finally {
    loader.style.display = 'none';
  }
}

// Initial Load
loadData('daily');

// Refresh every 5 minutes
setInterval(() => {
  const activeRange = document.querySelector('.controls button.active').id.replace('btn-', '');
  loadData(activeRange);
}, 300000);
</script>

</body>
</html>
